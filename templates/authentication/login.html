{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
   <title>Preskool - Login</title>

   <!-- Favicon -->
   <link rel="shortcut icon" href="{% static 'assets/img/favicon.png' %}">
   <!-- Google Fonts -->
   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap">
   <!-- Bootstrap CSS -->
   <link rel="stylesheet" href="{% static 'assets/plugins/bootstrap/css/bootstrap.min.css' %}">
   <!-- Font Awesome CSS -->
   <link rel="stylesheet" href="{% static 'assets/plugins/fontawesome/css/fontawesome.min.css' %}">
   <link rel="stylesheet" href="{% static 'assets/plugins/fontawesome/css/all.min.css' %}">
   <!-- Custom CSS -->
   <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
   <style id="premium-dark-mode">
          body, .main-wrapper, .page-wrapper {
              background-color: #0B1120 !important;
              color: #F3F4F6 !important;
          }
          .login-wrapper {
              background-color: #0B1120 !important;
          }
          .header, .sidebar, .sidebar-inner, .card, .loginbox, .login-right {
              background-color: #111827 !important;
              border-color: #1F2937 !important;
              color: #F3F4F6 !important;
          }
          h1, h2, h3, h4, h5, h6, .card-title, .page-title {
              color: #FFFFFF !important;
          }
          .form-control {
              background-color: #1F2937 !important;
              border: 1px solid #374151 !important;
              color: #F3F4F6 !important;
          }
          .form-control:focus {
              background-color: #0B1120 !important;
              border-color: #3B82F6 !important;
              box-shadow: 0 0 10px rgba(59, 130, 246, 0.5) !important;
          }
          .btn-primary {
              background-color: #2563EB !important;
              border-color: #2563EB !important;
              transition: all 0.3s ease;
          }
          .btn-primary:hover {
              background-color: #1D4ED8 !important;
              border-color: #1D4ED8 !important;
              transform: translateY(-2px);
              box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
          }
          .text-muted, .account-subtitle, .or-line, .span-or {
              color: #9CA3AF !important;
          }
          a {
              color: #60A5FA !important;
          }
          a:hover {
              color: #93C5FD !important;
          }
          .loginbox {
              box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.7), 0 8px 10px -6px rgba(0, 0, 0, 0.5) !important;
              border: 1px solid #1F2937 !important;
              border-radius: 16px !important;
              overflow: hidden;
          }
   </style>
</head>
<body>

<div class="main-wrapper login-body">
   <div class="login-wrapper">
      <div class="container">
         <div class="loginbox">
            <div class="login-left">
               <img class="img-fluid" src="{% static 'assets/img/logo-white.png' %}" alt="Logo">
            </div>
            <div class="login-right">
               <div class="login-right-wrap">
                  <h1>Login</h1>
                  <p class="account-subtitle">Access to our dashboard</p>
                  
                  <!-- Error and success messages -->
                  {% if messages %}
                  <div class="alert alert-info">
                     {% for message in messages %}
                        <p>{{ message }}</p>
                     {% endfor %}
                  </div>
                  {% endif %}
                  
                  <!-- Login Form -->
                  <form method="POST" action="{% url 'login' %}">
                     {% csrf_token %}
                     <div class="form-group">
                        <input class="form-control" type="text" name="email" placeholder="Email ou Nom d'utilisateur (ex: admin)" required>
                     </div>
                     <div class="form-group">
                        <input class="form-control" type="password" name="password" placeholder="Password" required>
                     </div>
                     <div class="form-group">
                        <button class="btn btn-primary btn-block" type="submit">Login</button>
                     </div>
                  </form>
                  
                  <div class="text-center forgotpass">
                     <a href="{% url 'forgot-password' %}">Forgot Password?</a>
                  </div>
                  <div class="login-or">
                     <span class="or-line"></span>
                     <span class="span-or">or</span>
                  </div>
                  <div class="social-login">
                     <span>Login with</span>
                     <a href="#" class="facebook"><i class="fab fa-facebook-f"></i></a>
                     <a href="#" class="google"><i class="fab fa-google"></i></a>
                  </div>
                  
                  <div class="text-center dont-have">
                     Don’t have an account? <a href="{% url 'signup' %}">Register</a>
                  </div>
               </div>
            </div>
         </div>
      </div>
   </div>
</div>

<!-- jQuery -->
<script src="{% static 'assets/js/jquery-3.6.0.min.js' %}"></script>
<!-- Bootstrap Core JS -->
<script src="{% static 'assets/js/popper.min.js' %}"></script>
<script src="{% static 'assets/plugins/bootstrap/js/bootstrap.min.js' %}"></script>
<!-- Custom JS -->
<script src="{% static 'assets/js/script.js' %}"></script>
</body>
</html>
